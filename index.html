<!DOCTYPE html>
<html>
<head>
<title>Untuk Farah 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    body{
    background:#ffe6f0;
    text-align:center;
    font-family:'Poppins', sans-serif;
    padding:40px;
    max-width:700px;
    margin:auto;
    overflow-x: hidden;
    }

/* Wadah utama slider foto */
.slider-container {
    position: relative;
    max-width: 250px;
    margin: 20px auto;
}

/* Mengatur semua foto di dalam slider */
.slider-foto {
    display: none;
    width: 250px;
    height: 330px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px pink;
    cursor: pointer;
    transition: 0.3s;
}

/* Hanya foto dengan class 'aktif' yang akan muncul */
.slider-foto.aktif {
    display: block;
}

.slider-foto.aktif, #fotoBesar img.aktif-pop {
    display: block;
    animation: pudarHalus 0.4s ease-in-out;
}

@keyframes pudarHalus {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

/* Mengatur Tombol Panah Global (Tetap pas di PC, HP, dan pas Zoom Gede) */
.tombol-panah {
    position: fixed; /* Diubah jadi fixed agar posisinya mengambang stabil di layar */
    top: 50%; /* Tepat di tengah layar secara vertikal */
    transform: translateY(-50%);
    background: rgba(255, 111, 165, 0.85);
    color: white;
    border: none;
    font-size: 24px;
    padding: 12px 15px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10000; /* Nilai super tinggi supaya muncul di atas overlay hitam pas diperbesar */
    user-select: none;
    transition: 0.2s;
}

.tombol-panah:hover {
    background: rgba(255, 111, 165, 1);
    transform: translateY(-50%) scale(1.1);
}

/* Jarak panah dari pinggir layar PC / HP */
.kiri { left: 5%; }
.kanan { right: 5%; }

/* Judul dan Tombol Surat */
h1, #tombol, #surat h3 {
    font-family: 'Pacifico', cursive;
    color:#ff4d88;
}

p{
    font-size:20px;
}

#surat{
    display:none;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:left;
    line-height:1.8;
    opacity:0;
    transition:1s;
}   

/* Animasi Hati */
.hati{
    position:fixed;
    top:-20px;
    font-size:25px;
    z-index: 99999;
    pointer-events:none;
    animation:
    jatuh 4s linear forwards,
    putar 2s linear infinite;
}

@keyframes jatuh{
    from{ top:-20px; }
    to{ top:100vh; }
}
@keyframes putar{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* Pop-up Foto Layar Penuh */
#fotoBesar {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    justify-content: center;
    align-items: center; 
}
#fotoBesar img {
    display: none;
    width: 85%;
    max-width: 450px;
    border-radius: 15px; 
    cursor: pointer;
}

/* Responsif buat HP (Biar panahnya gak terlalu mepet layar kecil) */
@media screen and (max-width: 480px) {
    body { padding: 20px; }
    .tombol-panah {
        font-size: 20px;
        padding: 10px 13px;
    }
    .kiri { left: 2%; }
    .kanan { right: 2%; }
}
</style>

</head>
<body>
<audio id="laguLatar" src="aboutyou.mp3" loop></audio>
<h1>Hai Farah 🌻</h1>

<button class="tombol-panah kiri" onclick="geserFoto(-1)">&#10094;</button>

<div class="slider-container">
    <img class="slider-foto aktif" src="IMG-20260610-WA0002.jpg" onclick="bukaFoto(this.src)">
    <img class="slider-foto" src="foto1.jpeg" onclick="bukaFoto(this.src)">
    <img class="slider-foto" src="foto2.jpeg" onclick="bukaFoto(this.src)">
    <img class="slider-foto" src="foto3.jpeg" onclick="bukaFoto(this.src)">
    <img class="slider-foto" src="foto4.jpeg" onclick="bukaFoto(this.src)">
</div>

<button class="tombol-panah kanan" onclick="geserFoto(1)">&#10095;</button>

<p>Makasih ya udah hadir di hidupku ❤️</p>
<p>Semoga kita selalu diberi kebahagiaan dan cerita indah.</p>

<button id="tombol" onclick="munculSurat()" style="padding:12px 25px; font-size:18px; border:none; border-radius:15px; background:#ff6fa5; color:white; cursor:pointer;">
💌 Buka Surat
</button>

<div id="fotoBesar" onclick="tutupFoto()">
    <img src="">
</div>

<div id="surat">
<h3>Hai Farah 🌻</h3>
<p>Makasih ya udah hadir di hidupku.</p>
<p>Semoga hari-harimu selalu dipenuhi hal baik, dan semoga aku bisa jadi salah satu alasan kamu tersenyum.</p>
<p>❤️</p>
</div>

<script>
let indeksFoto = 0;

function geserFoto(arah) {
    let daftarFoto = document.getElementsByClassName("slider-foto");
    daftarFoto[indeksFoto].classList.remove("aktif");
    
    indeksFoto = indeksFoto + arah;
    
    if (indeksFoto >= daftarFoto.length) {
        indeksFoto = 0;
    }
    if (indeksFoto < 0) {
        indeksFoto = daftarFoto.length - 1;
    }
    
    daftarFoto[indeksFoto].classList.add("aktif");
    
    // Logika sinkronisasi: kalau foto besar lagi kebuka, ikut ganti gambarnya di dalam pop-up
    let popUp = document.getElementById("fotoBesar");
    let gambarPopUp = document.querySelector("#fotoBesar img");
    
    if (popUp.style.display === "flex") {
        gambarPopUp.classList.remove("aktif-pop");
        gambarPopUp.src = daftarFoto[indeksFoto].src;
        setTimeout(function(){
            gambarPopUp.classList.add("aktif-pop");
        }, 10);
    }
}

function munculSurat(){
    let surat = document.getElementById("surat");
    let tombol = document.getElementById("tombol");

    surat.style.display = "block";

    setTimeout(function(){
        surat.style.opacity = "1";
    },100);

    tombol.innerHTML = "❤️ Surat Sudah Dibuka";
    tombol.style.background = "#cc3366";

    setTimeout(function(){
        tombol.style.display = "none";
    },1500);

    for(let i=0;i<15;i++){
        let hati = document.createElement("div");
        hati.innerHTML = "❤️";
        hati.className = "hati";
        hati.style.left = Math.random()*100 + "vw";
        hati.style.animationDuration = (Math.random()*3 + 2) + "s";
        document.body.appendChild(hati);
        setTimeout(function() {
            hati.remove();
        }, 5000);
    }
}

function bukaFoto(jalurGambar){
    let gambarPopUp = document.querySelector("#fotoBesar img");
    gambarPopUp.src = jalurGambar;
    gambarPopUp.classList.add("aktif-pop");
    
    document.getElementById("fotoBesar").style.display = "flex";
    document.getElementById("laguLatar").play();
}

function tutupFoto(){
    document.getElementById("fotoBesar").style.display = "none";
    document.querySelector("#fotoBesar img").classList.remove("aktif-pop");
    document.getElementById("laguLatar").pause();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Untuk Farah 🌻</title>

<style>
    body{
    background:#ffe6f0;
    text-align:center;
    font-family:Arial;
    padding:40px;

    max-width:700px;
    margin:auto;
    }

img{
    width:250px;
    border-radius:20px;
    box-shadow:0 0 20px pink;
}
img:hover{
    transform:scale(1.05);
    transition:0.3s;
}
h1{
    color:#ff4d88;
}

p{
    font-size:20px;
}
   #surat{
    display:none;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:left;
    line-height:1.8;

    opacity:0;
    transition:1s;
}
</style>

</head>
<body>

<h1>Hai Farah 🌻</h1>

<img src="IMG-20260610-WA0002.jpg">

<p>
Makasih ya udah hadir di hidupku ❤️
</p>

<p>
Semoga kita selalu diberi kebahagiaan dan cerita indah.
</p>
<button onclick="munculSurat()"
style="
padding:12px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:#ff6fa5;
color:white;
cursor:pointer;
">
💌 Buka Surat
</button>

<p id="surat">
Hai Farah 🌻

Makasih ya udah hadir di hidupku.
    
Semoga hari-harimu selalu dipenuhi hal baik,
dan semoga aku bisa jadi salah satu alasan kamu tersenyum.

❤️
</p>

<script>
function munculSurat(){

let surat = document.getElementById("surat");

surat.style.display = "block";

setTimeout(function(){
    surat.style.opacity = "1";
},100);
}
</script>
</body>
</html>

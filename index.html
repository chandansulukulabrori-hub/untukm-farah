<!DOCTYPE html>
<html>
<head>
<title>Untuk Farah 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    body{
    background:#ffe6f0;
    text-align:center;
    font-family:'Poppins', sans-serif;
    padding:40px;

    max-width:700px;
    margin:auto;
    overflow-x: hidden;
    }
.galeri-foto {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    max-width: 500px;
    margin: 20px auto;
}
.galeri-foto img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 0 15px pink;
    cursor: pointer;
    transition: 0.3s;
}
.galeri-foto img:hover {
    transform: scale(1.05);
}
#foto{
    width:250px;
    border-radius:20px;
    box-shadow:0 0 20px pink;
    cursor: pointer;
}
#foto:hover{
    transform:scale(1.05);
    transition:0.3s;
}
h1, #tombol, #surat h3 {
    font-family: 'Pacifico', cursive;
    color:#ff4d88;
}

p{
    font-size:20px;
}

#surat{
    display:none;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:left;
    line-height:1.8;
    opacity:0;
    transition:1s;
}   
.hati{
    position:fixed;
    top:-20px;
    font-size:25px;
    z-index: 999;
    pointer-events:none;
    animation:
    jatuh 4s linear forwards,
    putar 2s linear infinite;
}

@keyframes jatuh{
    from{
        top:-20px;
    }
    to{
        top:100vh;
    }
}
@keyframes putar{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
#fotoBesar {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    justify-content: center;
    align-items: center; 
    cursor: pointer;
}
#fotoBesar img {
    width: 85%;
    max-width: 500px;
    border-radius: 15px; 
}
</style>

</head>
<body>
<audio id="laguLatar" src="aboutyou.mp3" loop></audio>
<h1>Hai Farah 🌻</h1>

<div class="galeri-foto">
    <img src="IMG-20260610-WA0002.jpg" onclick="bukaFoto(this.src)">
    <img src="foto1.jpg" onclick="bukaFoto(this.src)">
    <img src="foto2.jpg" onclick="bukaFoto(this.src)">
    <img src="foto3.jpg" onclick="bukaFoto(this.src)">
    <img src="foto4.jpg" onclick="bukaFoto(this.src)">
</div>

<p>
Makasih ya udah hadir di hidupku ❤️
</p>

<p>
Semoga kita selalu diberi kebahagiaan dan cerita indah.
</p>
<button id="tombol" onclick="munculSurat()"
style="
padding:12px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:#ff6fa5;
color:white;
cursor:pointer;
">
💌 Buka Surat
</button>

<div id="fotoBesar" onclick="tutupFoto()">
    <img src=""> </div>
</div>

<div id="surat">
<h3>Hai Farah 🌻</h3>

<p>
Makasih ya udah hadir di hidupku.
</p>

<p>
Semoga hari-harimu selalu dipenuhi hal baik,
dan semoga aku bisa jadi salah satu alasan kamu tersenyum.
</p>

<p>
❤️
</p>
</div>
<script>
function munculSurat(){

let surat = document.getElementById("surat");
let tombol = document.getElementById("tombol");

surat.style.display = "block";

setTimeout(function(){
    surat.style.opacity = "1";
},100);

tombol.innerHTML = "❤️ Surat Sudah Dibuka";
tombol.style.background = "#cc3366";

setTimeout(function(){
    tombol.style.display = "none";
},1500);

for(let i=0;i<15;i++){

let hati = document.createElement("div");

hati.innerHTML = "❤️";

hati.className = "hati";

hati.style.left = Math.random()*100 + "vw";

hati.style.animationDuration =
(Math.random()*3 + 2) + "s";

document.body.appendChild(hati);
setTimeout(function() {
    hati.remove();
}, 5000);
    }
}

function bukaFoto(jalurGambar){
    // 1. Ganti gambar di dalam pop-up sesuai gambar yang diklik Farah
    document.querySelector("#fotoBesar img").src = jalurGambar;
    document.getElementById("fotoBesar").style.display = "flex";
    document.getElementById("laguLatar").play();
}

function tutupFoto(){
    document.getElementById("fotoBesar").style.display = "none";
    document.getElementById("laguLatar").pause();
}
</script>
</body>
</html>

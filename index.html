<!DOCTYPE html>
<html>
<head>
<title>Untuk Farah 🌻</title>

<style>
    body{
    background:#ffe6f0;
    text-align:center;
    font-family:Arial;
    padding:40px;

    max-width:700px;
    margin:auto;
    }

img{
    width:250px;
    border-radius:20px;
    box-shadow:0 0 20px pink;
}
img:hover{
    transform:scale(1.05);
    transition:0.3s;
}
h1{
    color:#ff4d88;
}

p{
    font-size:20px;
}

#surat{
    display:none;
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:left;
    line-height:1.8;
    opacity:0;
    transition:1s;
}
    
.hati{
    position:fixed;
    top:-20px;
    font-size:25px;
    animation:
    jatuh 4s linear forwards,
    putar 2s linear infinite;
}

@keyframes jatuh{
    from{
        top:-20px;
    }

    to{
        top:100vh;
    }
}
@keyframes putar{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}
#fotoBesar{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

#fotoBesar img{
    width:80%;
    max-width:600px;
    margin-top:50px;
}
</style>

</head>
<body>

<h1>Hai Farah 🌻</h1>

<img
id="foto"
src="IMG-20260610-WA0002.jpg"
onclick="bukaFoto()">

<p>
Makasih ya udah hadir di hidupku ❤️
</p>

<p>
Semoga kita selalu diberi kebahagiaan dan cerita indah.
</p>
<button id="tombol" onclick="munculSurat()"
style="
padding:12px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:#ff6fa5;
color:white;
cursor:pointer;
">
💌 Buka Surat
</button>

<div id="fotoBesar" onclick="tutupFoto()">
    <img src="IMG-20260610-WA0002.jpg">
</div>

<div id="surat">
<h3>Hai Farah 🌻</h3>

<p>
Makasih ya udah hadir di hidupku.
</p>

<p>
Semoga hari-harimu selalu dipenuhi hal baik,
dan semoga aku bisa jadi salah satu alasan kamu tersenyum.
</p>

<p>
❤️
</p>
</div>
<script>
function munculSurat(){

let surat = document.getElementById("surat");
let tombol = document.getElementById("tombol");

surat.style.display = "block";

setTimeout(function(){
    surat.style.opacity = "1";
},100);

tombol.innerHTML = "❤️ Surat Sudah Dibuka";
tombol.style.background = "#cc3366";

setTimeout(function(){
    tombol.style.display = "none";
},1500);

for(let i=0;i<15;i++){

let hati = document.createElement("div");

hati.innerHTML = "❤️";

hati.className = "hati";

hati.style.left = Math.random()*100 + "vw";

hati.style.animationDuration =
(Math.random()*3 + 2) + "s";

document.body.appendChild(hati);

}

}

function bukaFoto(){
document.getElementById("fotoBesar").style.display = "block";
}

function tutupFoto(){
document.getElementById("fotoBesar").style.display = "none";
}
</script>
</body>
</html>
